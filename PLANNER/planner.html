<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Study Planner</title>
    <link rel="stylesheet" href="planner.css" />
  </head>
  <body>
    <header>
      <h1>📚 Student Study Planner</h1>
      <p>Plan smarter. Study better.</p>
      <button id="themeToggle">🌙 Dark Mode</button>
    </header>

    <main class="container">
      <section>
        <h2>Add Study Task</h2>
        <form id="taskForm">
          <input type="text" id="subject" placeholder="Subject" required />
          <input
            type="text"
            id="task"
            placeholder="Task description"
            required
          />
          <input type="date" id="date" required />
          <select id="day" required>
            <option value="">Select Day</option>
            <option>Monday</option>
            <option>Tuesday</option>
            <option>Wednesday</option>
            <option>Thursday</option>
            <option>Friday</option>
            <option>Saturday</option>
            <option>Sunday</option>
          </select>
          <button type="submit">Add Task</button>
        </form>
      </section>

      <section>
        <h2>Weekly Planner</h2>
        <div id="weeklyPlanner" class="week-grid"></div>
      </section>

      <section>
        <h2>Progress</h2>
        <div class="progress-bar">
          <div id="progressFill"></div>
        </div>
        <p id="progressText">0% Completed</p>
        <p id="streak">🔥 Study Streak: 0 days</p>
      </section>
    </main>

    <footer>© 2025 Student Study Planner</footer>

    <script src="planner.js"></script>
  </body>
</html>
